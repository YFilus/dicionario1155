<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dicionário do 1155 do ET</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Dicionário do 1155 do ET</h1>
    <p class="subtitle">Vocabulário de informática e games do universo ET</p>
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Buscar termo ou definição..." autofocus>
      <span class="search-icon">🔍</span>
    </div>
  </header>
  <main>
    <div id="loadingState" class="loading-state">Carregando termos...</div>
    <div id="entriesContainer" class="entries"></div>
    <div id="emptyState" class="empty-state hidden">
      <p>Nenhum termo encontrado para "<span id="noResultsTerm"></span>"</p>
    </div>
  </main>
  <footer>
    <p>Feito com <span class="heart">💜</span> para a comunidade do ET</p>
    <div class="footer-links">
      <a href="https://www.youtube.com/@1155doET" target="_blank" rel="noopener noreferrer">📺 1155 do ET</a>
      <a href="https://www.youtube.com/@ClipesdoET" target="_blank" rel="noopener noreferrer">🎬 Clipes do ET</a>
    </div>
  </footer>
  <script src="app.js"></script>
</body>
</html>
